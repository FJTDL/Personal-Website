title: Blog Feed
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn J.T. de Lange | Blog</title>
    <!-- Link your existing global stylesheet here so font family and body backgrounds match -->
    <link rel="stylesheet" href="./Static/css/styles.css"> 
</head>
<body>

    <!-- Simple Navigation Back Home -->
    <nav style="padding: 20px; max-width: 800px; margin: 0 auto;">
        <a href="./index.html" style="text-decoration: none; color: #0076ff; font-weight: bold;">← Back to Portfolio</a>
    </nav>

    <!-- The Feed Container -->
    <main style="max-width: 800px; margin: 0 auto; padding: 0 20px 100px 20px;">
        
        {% for post in site.posts %}
            <article style="margin-bottom: 5rem; border-bottom: 2px solid #eee; padding-bottom: 4rem;">
                <header style="margin-bottom: 1.5rem;">
                    <span style="color: #666; font-size: 0.9rem; font-weight: 500;">{{ post.date | date: "%B %d, %Y" }}</span>
                    <h1 style="font-size: 2.2rem; margin: 0.5rem 0 0 0; color: #111;">{{ post.title }}</h1>
                </header>

                <!-- This is where Jekyll injects the markdown text, images, and math -->
                <div class="post-content" style="line-height: 1.7; font-size: 1.1rem; color: #333;">
                    {{ post.content }}
                </div>
            </article>
        {% empty %}
            <p style="text-align: center; color: #666; margin-top: 4rem;">No posts published yet. Check back soon!</p>
        {% endfor %}

    </main>

    <!-- MathJax for LaTeX Rendering (Scoped only to the blog feed) -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</body>
</html>
